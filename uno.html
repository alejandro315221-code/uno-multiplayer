<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tabletop Online</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
body{font-family:system-ui;background:#111;color:#eee;margin:0}
.wrap{max-width:900px;margin:0 auto;padding:16px}
.card{background:#1d1d1d;border:1px solid #333;border-radius:12px;padding:12px;margin-bottom:12px}
input,select,button{padding:8px;border-radius:8px;border:1px solid #444;background:#222;color:#eee}
button{cursor:pointer}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#game,#lobby{display:none}
#chatBox{height:160px;overflow:auto;background:#0f0f0f;padding:8px;border-radius:8px}
</style>
</head>
<body>
<div class="wrap">
  <div id="join" class="card">
    <h2><span style="font-family:'Trebuchet MS',sans-serif">Tabletop</span> <span style="font-family:Georgia,serif;color:#4cc9f0">Online</span></h2>
    <div class="row">
      <input id="name" placeholder="Your name"/>
      <input id="room" placeholder="Room code"/>
      <select id="gameType">
        <option value="crazy_eights">Crazy Eights</option>
        <option value="bingo">Bingo</option>
        <option value="blackjack">Blackjack</option>
      </select>
      <button onclick="joinRoom()">Join</button>
    </div>
    <div id="err" style="color:#ff6b6b"></div>
  </div>

  <div id="lobby" class="card">
    <h3>Lobby <span id="roomLabel"></span></h3>
    <div id="players"></div>
    <div class="row">
      <label><input type="checkbox" id="optChatFilter"> Chat filter</label>
      <label><input type="checkbox" id="optHostClear"> Host clear chat</label>
      <label><input type="checkbox" id="optMusic"> Gameplay music</label>
      <label><input type="checkbox" id="optBjBet" checked> BJ betting enabled</label>
      <label><input type="checkbox" id="optBingoAuto" checked> Bingo auto draw</label>
      <label>Interval <input id="optBingoSec" type="number" min="3" value="10" style="width:70px">s</label>
      <button onclick="saveOptions()">Save Options</button>
      <button onclick="startGame()">Start</button>
    </div>
  </div>

  <div id="game" class="card">
    <h3 id="modeTitle">Game</h3>
    <div id="state"></div>

    <div id="ceActions" class="row" style="display:none">
      <button onclick="send({type:'draw'})">Draw</button>
      <button onclick="send({type:'pass'})">Pass</button>
    </div>

    <div id="bingoActions" class="row" style="display:none">
      <button onclick="send({type:'bingo_draw_next'})">Host Draw Next</button>
      <button onclick="send({type:'bingo_pause'})">Pause Auto</button>
      <button onclick="send({type:'bingo_resume'})">Resume Auto</button>
      <button onclick="send({type:'bingo_claim'})">Claim Bingo</button>
    </div>

    <div id="bjActions" class="row" style="display:none">
      <button onclick="send({type:'bj_hit'})">Hit</button>
      <button onclick="send({type:'bj_stand'})">Stand</button>
    </div>

    <div class="row" style="margin-top:8px">
      <button onclick="send({type:'restart'})">Back to Lobby</button>
    </div>
  </div>

  <div class="card">
    <h3>Chat</h3>
    <div id="chatBox"></div>
    <div class="row" style="margin-top:8px">
      <input id="chatInput" placeholder="Message" style="flex:1"/>
      <button onclick="sendChat()">Send</button>
      <button onclick="send({type:'clear_chat'})">Host Clear</button>
    </div>
  </div>
</div>

<script>
const SUIT_SYMBOL = {Spades:'♠',Hearts:'♥',Diamonds:'♦',Clubs:'♣'};
const WS_URL = location.protocol==='https:' ? `wss://${location.host}` : `ws://${location.host}`;
let ws, myRoom='', myName='', isHost=false, gameType='crazy_eights';

function connect(){
  ws = new WebSocket(WS_URL);
  ws.onmessage = e => { try { handle(JSON.parse(e.data)); } catch(err){ console.error(err); } };
  ws.onclose = ()=>setTimeout(connect,1500);
}
connect();

function send(o){ if (ws && ws.readyState===1) ws.send(JSON.stringify(o)); }

function joinRoom(){
  const name = document.getElementById('name').value.trim();
  const room = document.getElementById('room').value.trim().toUpperCase();
  const gt = document.getElementById('gameType').value;
  if(!name||!room){ document.getElementById('err').textContent='Need name + room'; return; }
  myName=name; myRoom=room; gameType=gt;
  send({type:'join',name,code:room,gameType:gt});
}

function saveOptions(){
  send({
    type:'set_room_options',
    chatFilterEnabled: document.getElementById('optChatFilter').checked,
    hostCanClearChat: document.getElementById('optHostClear').checked,
    gameplayMusicEnabled: document.getElementById('optMusic').checked,
    bjBettingEnabled: document.getElementById('optBjBet').checked,
    bingoAutoDrawEnabled: document.getElementById('optBingoAuto').checked,
    bingoDrawIntervalSec: Number(document.getElementById('optBingoSec').value || 10)
  });
}
function startGame(){ send({type:'start'}); }
function sendChat(){
  const i=document.getElementById('chatInput'); const t=i.value.trim(); if(!t) return;
  send({type:'chat',text:t}); i.value='';
}

function handle(msg){
  if(msg.type==='error'){ document.getElementById('err').textContent=msg.msg; return; }
  if(msg.type==='joined'){
    isHost = !!msg.isHost;
    document.getElementById('join').style.display='none';
    document.getElementById('lobby').style.display='block';
    document.getElementById('roomLabel').textContent = msg.code;
    return;
  }
  if(msg.type==='lobby'){
    gameType = msg.gameType || gameType;
    document.getElementById('players').textContent = 'Players: ' + msg.players.join(', ');
    document.getElementById('optChatFilter').checked = !!msg.chatFilterEnabled;
    document.getElementById('optHostClear').checked = !!msg.hostCanClearChat;
    document.getElementById('optMusic').checked = !!msg.gameplayMusicEnabled;
    document.getElementById('optBjBet').checked = msg.bjBettingEnabled !== false;
    document.getElementById('optBingoAuto').checked = msg.bingoAutoDrawEnabled !== false;
    document.getElementById('optBingoSec').value = msg.bingoDrawIntervalSec || 10;
    return;
  }
  if(msg.type==='state'){
    document.getElementById('lobby').style.display='none';
    document.getElementById('game').style.display='block';
    const mode = msg.gameType || gameType;
    document.getElementById('modeTitle').textContent = mode.replace('_',' ').toUpperCase();

    document.getElementById('ceActions').style.display = mode==='crazy_eights' ? 'flex' : 'none';
    document.getElementById('bingoActions').style.display = mode==='bingo' ? 'flex' : 'none';
    document.getElementById('bjActions').style.display = mode==='blackjack' ? 'flex' : 'none';

    if(mode==='crazy_eights'){
      const top = msg.topCard ? `${msg.topCard.rank}${SUIT_SYMBOL[msg.topCard.suit]||''}` : '—';
      document.getElementById('state').textContent =
        `Top: ${top} | Active: ${msg.activeRank}${SUIT_SYMBOL[msg.activeSuit]||''} | Deck: ${msg.deckCount}`;
    } else if(mode==='blackjack'){
      document.getElementById('state').textContent =
        `Blackjack phase: ${msg.phase || ''} | Turn: ${msg.turnIdx ?? ''}`;
    }
    return;
  }
  if(msg.type==='bingo_start'){
    document.getElementById('lobby').style.display='none';
    document.getElementById('game').style.display='block';
    document.getElementById('modeTitle').textContent = 'BINGO';
    document.getElementById('ceActions').style.display='none';
    document.getElementById('bjActions').style.display='none';
    document.getElementById('bingoActions').style.display='flex';
    document.getElementById('state').textContent='Bingo started.';
    return;
  }
  if(msg.type==='bingo_draw'){
    document.getElementById('state').textContent = `Bingo draw: ${msg.number} | Drawn count: ${msg.drawn.length}`;
    return;
  }
  if(msg.type==='chat'){
    const box=document.getElementById('chatBox');
    box.innerHTML += `<div><b>${msg.from}:</b> ${msg.text}</div>`;
    box.scrollTop = box.scrollHeight;
    return;
  }
  if(msg.type==='chat_cleared'){ document.getElementById('chatBox').innerHTML=''; return; }
  if(msg.type==='gameover'){ document.getElementById('state').textContent = `Winner: ${msg.winner}`; return; }
}
</script>
</body>
</html>
